name: Workflow

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # har 6 ghante (pehle har ghante tha)

jobs:
  # Pehle purane runs delete karo
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5  # sirf last 5 runs rakhega

  # Phir cards update karo
  update-cards:
    runs-on: ubuntu-latest
    needs: cleanup  # pehle cleanup ho, phir yeh chale

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: muhammadhammadtech
          THEME: transparent
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit Cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add profile-summary-card-output/transparent
          git commit -m "Auto-update transparent profile summary cards" || echo "No changes to commit"
          git push
